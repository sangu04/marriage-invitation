<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Our Memories</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css?v=7" />
  <style>
    body { background: #fffaf7; color: #4a4e69; }
    .album-page { max-width: 1400px; margin: 0 auto; padding: 40px 20px 80px; }
    .album-header { text-align: center; margin-bottom: 30px; }
    .album-header h1 { font-family: 'Cinzel', serif; color: #a62a22; margin-bottom: 8px; }
    .album-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .album-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 28px rgba(0,0,0,0.08); }
    .album-card img { width: 100%; height: 260px; object-fit: cover; display: block; }
    .back-link { display: inline-block; margin-top: 20px; color: #a62a22; text-decoration: none; font-weight: 600; }
    @media (max-width: 768px) { .album-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="page-content">
    <div class="album-page">
      <div class="album-header">
        <h1>Our Memories</h1>
        <p>A collection of beautiful moments from our journey together.</p>
        <a class="back-link" href="index.html">← Back to Invitation</a>
      </div>
      <div class="album-grid">
      <div class="album-card"><img src="our%20memory1.jpg" alt="Our Memory 1" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory2.jpg" alt="Our Memory 2" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory3.jpg" alt="Our Memory 3" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory4.jpg" alt="Our Memory 4" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory5.jpg" alt="Our Memory 5" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory6.jpg" alt="Our Memory 6" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory7.jpg" alt="Our Memory 7" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory8.jpg" alt="Our Memory 8" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory9.jpg" alt="Our Memory 9" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory10.jpg" alt="Our Memory 10" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory11.jpg" alt="Our Memory 11" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory12.jpg" alt="Our Memory 12" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory13.jpg" alt="Our Memory 13" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory14.jpg" alt="Our Memory 14" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory%2015.jpg" alt="Our Memory 15" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory16.jpg" alt="Our Memory 16" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory17.jpg" alt="Our Memory 17" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory18.jpg" alt="Our Memory 18" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory20.jpg" alt="Our Memory 20" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory21.jpg" alt="Our Memory 21" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory22.jpg" alt="Our Memory 22" loading="lazy"></div>
      <div class="album-card"><img src="our%20memory%2012.jpg" alt="Our Memory 12 Alternate" loading="lazy"></div>
      </div>
    </div>
  </div>
  <audio id="bg-music" loop preload="none">
    <source src="sangu%20audio.mpeg" type="audio/mpeg">
  </audio>
  <button id="music-toggle" class="music-toggle" title="Play or pause music" aria-label="Play or pause music">
    <i class="fa-solid fa-circle-play"></i>
    <span>Music</span>
  </button>
  <script src="script.js?v=7"></script>
</body>
</html>
